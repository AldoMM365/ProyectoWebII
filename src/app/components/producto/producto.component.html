<div class="card">
    <p class="sku">SKU: {{ product.id }}</p>
  <img [src]="product.imageUrl" alt="" />

  <div class="info">
    <h4>{{ product.name }}</h4>

    <p class="price">${{ product.price }}</p>

    <button (click)="onAdd()" [disabled]="!product.inStock" [class]="product.inStock ? 'btn' : 'disabled-btn'">
      Añadir al carrito
    </button>
  </div>
</div>
