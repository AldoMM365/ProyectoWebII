<header class="header">
  <div class="top-bar">
    <img class="logo" src="logo.png" alt="Logo de la tienda" />

    <div class="search">
      <input type="text" placeholder="Buscar productos..." />
      <button>🔍</button>
    </div>

    <div class="icons">
      @if (authService.isLoggedIn()){
        <span>👤<span class="username">{{name()}}</span></span>
      }
      @else {
        <a class="username" href="/login">Iniciar sesión</a>
      }
      <span class="cart-icon" (click)="onCartClick()">
        <div class="cart-items">
          {{cantidad()}}
        </div>
        🛒
      </span>
      @if (authService.isLoggedIn()){
        <options-menu></options-menu>
      }
    </div>
  </div>

  <nav class="nav">
    <a href="#">Componentes</a>
    <a href="#">Desarrollo</a>
    <a href="#">SMD</a>
    <a href="#">Optoelectrónica</a>
    <a href="#">Herramientas</a>
    <a href="#">3D / CNC</a>
    <a href="#">Energía</a>
    <a href="#">Audio y Video</a>
    <a href="#">Más categorías</a>
  </nav>
</header>
