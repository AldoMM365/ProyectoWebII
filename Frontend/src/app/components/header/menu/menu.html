<span ngMenuTrigger #origin #trigger="ngMenuTrigger" [menu]="formatMenu()">
    <i class="fa-solid fa-bars"></i>
</span>
<ng-template
  [cdkConnectedOverlayOpen]="trigger.expanded()"
  [cdkConnectedOverlay]="{origin, usePopover: 'inline'}"
  [cdkConnectedOverlayPositions]="[
    {originX: 'start', originY: 'bottom', overlayX: 'start', overlayY: 'top', offsetY: 4},
  ]"
  cdkAttachPopoverAsChild
>
  <div ngMenu class="menu" #formatMenu="ngMenu">
    <ng-template ngMenuContent>
      @if (authService.hasRole('empleado')) {
        <div ngMenuItem value="Products" (click)="onProductosClick()">
          <span class="icon material-symbols-outlined" translate="no" aria-hidden="true">inventory_2</span>
          <span class="label">Productos</span>
        </div>
        <div ngMenuItem value="Orders" (click)="onGestionPedidosClick()">
          <span class="icon material-symbols-outlined" translate="no" aria-hidden="true">receipt_long</span>
          <span class="label">Gestión de pedidos</span>
        </div>
      }
      <div ngMenuItem value="Archive" (click)="onPedidosClick()">
        <span class="icon material-symbols-outlined" translate="no" aria-hidden="true"
          >package</span
        >
        <span class="label">Pedidos</span>
      </div>
      <div ngMenuItem value="Report spam" (click)="onPerfilClick()">
        <span class="icon material-symbols-outlined" translate="no" aria-hidden="true">person</span>
        <span class="label">Perfil</span>
      </div>
      <div ngMenuItem value="Delete" (click)="onLogoutClick()">
        <span class="icon material-symbols-outlined" translate="no" aria-hidden="true">logout</span>
        <span class="label">Cerrar sesión</span>
      </div>
    </ng-template>
  </div>
</ng-template>
