<form [formGroup]="form" (ngSubmit)="register()">
	<fieldset>
		<legend>Crear cuenta</legend>
		<p class="subtitle">Regístrate para guardar tus pedidos y acceder al carrito.</p>

		@if (errorMessage) {
			<div class="message message-error">{{ errorMessage }}</div>
		}

		@if (successMessage) {
			<div class="message message-success">{{ successMessage }}</div>
		}

		<div class="form-field">
			<label for="email">Correo electrónico</label>
			<input id="email" name="email" formControlName="email" type="email" placeholder="tu@correo.com" />
		</div>

		<div class="form-field">
			<label for="name">Nombre</label>
			<input id="name" name="name" formControlName="name" type="text" placeholder="Tu nombre completo" />
		</div>

		<div class="form-field">
			<label for="password">Contraseña</label>
			<input id="password" name="password" formControlName="password" type="password" placeholder="Mínimo 6 caracteres" />
		</div>

		<div class="form-field">
			<label for="confirmPassword">Confirmar contraseña</label>
			<input
				id="confirmPassword"
				name="confirmPassword"
				formControlName="confirmPassword"
				type="password"
				placeholder="Repite tu contraseña"
			/>
		</div>
	</fieldset>

	<div class="form-buttons">
		<button class="button button-primary" type="submit">Registrarse</button>
		<a class="login-link" href="/login">Ya tengo una cuenta</a>
	</div>
</form>
