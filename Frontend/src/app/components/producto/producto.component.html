<div class="card">
  <p class="sku">SKU: {{ product.sku }}</p>
  <p class="category">{{ product.categoria }}</p>
  <img [src]="product.imagen" alt="" />

  <div class="info">
    <h4>{{ product.nombre }}</h4>

    <p class="price">${{ product.precio }}</p>
    <p class="price">{{ product.stock }} disponibles</p>

    <button (click)="onAdd()" [disabled]="product.stock === 0" [class]="product.stock === 0 ? 'disabled-btn' : 'btn'">
      Añadir al carrito
    </button>
  </div>
</div>
