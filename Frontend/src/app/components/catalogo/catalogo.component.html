@if (filteredProducts().length === 0) {
  <p class="catalog-empty">No se encontraron productos con ese filtro.</p>
} @else {
  <section class="grid">
    @for (p of filteredProducts(); track p.id) {
      <app-product-card [product]="p" (add)="agregar($event)"></app-product-card>
    }
  </section>
}
